# Production overlay. Run with both files explicitly so the dev override is NOT auto-merged:
#   docker compose -f docker-compose.yml -f docker-compose.prod.yml up -d
#
# Puts Caddy in front of n8n and NocoDB for automatic HTTPS (Let's Encrypt)
# and stops them from ever being exposed directly on the host. Assumes the
# VPS is reachable directly on its own IPv6 address (e.g. via a Cloudflare
# proxied AAAA record) — Caddy needs real inbound traffic on 80/443 to
# terminate TLS and complete the ACME challenge itself.

volumes:
  caddy_data:
  caddy_config:

services:
  n8n:
    environment:
      - N8N_PROTOCOL=https
      - N8N_HOST=${N8N_HOST}
      - WEBHOOK_URL=https://${N8N_HOST}/

  caddy:
    image: caddy:2-alpine
    restart: unless-stopped
    ports:
      - '80:80'
      - '443:443'
    environment:
      - N8N_HOST=${N8N_HOST}
      - NC_HOST=${NC_HOST}
      - LIBRECHAT_HOST=${LIBRECHAT_HOST}
      - STATUS_HOST=${STATUS_HOST}
    volumes:
      - ./Caddyfile:/etc/caddy/Caddyfile:ro
      - caddy_data:/data
      - caddy_config:/config
    depends_on:
      - n8n
      - nocodb
      - librechat
      - uptime-kuma
