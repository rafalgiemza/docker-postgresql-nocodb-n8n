# Production overlay. Run with both files explicitly so the dev override is NOT auto-merged:
#   docker compose -f docker-compose.yml -f docker-compose.prod.yml up -d
#
# Puts Caddy in front of n8n and NocoDB, routed by Host header, and stops
# them from ever being exposed directly on the host. TLS is NOT terminated
# here — this is built for hosting behind mikr.us's `domena` subdomain proxy,
# which terminates SSL at its own edge and forwards plain HTTP to
# CADDY_HTTP_PORT. Register both N8N_HOST and NC_HOST with mikr.us pointing
# at the same CADDY_HTTP_PORT, e.g.:
#   domena n8n-coaction.byst.re 8000
#   domena back-office-coaction.byst.re 8000

volumes:
  caddy_data:
  caddy_config:

services:
  n8n:
    environment:
      - N8N_PROTOCOL=https
      - N8N_HOST=${N8N_HOST}
      - WEBHOOK_URL=https://${N8N_HOST}/

  caddy:
    image: caddy:2-alpine
    restart: unless-stopped
    ports:
      - '${CADDY_HTTP_PORT}:${CADDY_HTTP_PORT}'
    environment:
      - N8N_HOST=${N8N_HOST}
      - NC_HOST=${NC_HOST}
      - CADDY_HTTP_PORT=${CADDY_HTTP_PORT}
    volumes:
      - ./Caddyfile:/etc/caddy/Caddyfile:ro
      - caddy_data:/data
      - caddy_config:/config
    depends_on:
      - n8n
      - nocodb
