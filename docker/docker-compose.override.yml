# Auto-loaded by `docker compose up` when no -f flags are given.
# Local-dev convenience only — never used in production (docker-compose.prod.yml is explicit -f instead).

services:
  n8n:
    ports:
      - '5678:5678'
    environment:
      - N8N_HOST=localhost
      - N8N_PROTOCOL=http
      - WEBHOOK_URL=http://localhost:5678/

  postgres:
    ports:
      - '5432:5432'

  nocodb:
    ports:
      - '8081:8080'
    environment:
      # Bypasses Caddy/the public MINIO_HOST — MinIO's port is published
      # straight to the host below, same trick as N8N_HOST=localhost above.
      - NC_S3_ENDPOINT=http://localhost:9000

  minio:
    ports:
      - '9000:9000'
      - '9001:9001'
