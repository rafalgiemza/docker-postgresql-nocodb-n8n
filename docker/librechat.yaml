# Minimal LibreChat config — one custom endpoint (OpenRouter), reusing the
# OPENROUTER_API_KEY already used by n8n. See docker/.env.example for the
# OPENROUTER_KEY rebind gotcha and docker/README.md for the full explanation.
version: 1.3.13
cache: true
endpoints:
  custom:
    - name: 'OpenRouter'
      apiKey: '${OPENROUTER_KEY}'
      baseURL: 'https://openrouter.ai/api/v1'
      models:
        default: ['anthropic/claude-sonnet-4.5']
        fetch: true
      titleConvo: true
      dropParams: ['stop']
      modelDisplayLabel: 'OpenRouter'
