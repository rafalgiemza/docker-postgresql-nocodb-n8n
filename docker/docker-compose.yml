volumes:
  db_storage:
  n8n_storage:
  nocodb_storage:
  minio_storage:
  caddy_data:
  caddy_config:

networks:
  default: {}

services:
  postgres:
    image: postgres:16
    restart: unless-stopped
    environment:
      - POSTGRES_USER
      - POSTGRES_PASSWORD
      - POSTGRES_DB
      - POSTGRES_NON_ROOT_USER
      - POSTGRES_NON_ROOT_PASSWORD
      - NC_DB_USER
      - NC_DB_PASSWORD
      - NC_DB
      - APPDATA_OWNER_USER
      - APPDATA_OWNER_PASSWORD
      - NOCODB_CRM_USER
      - NOCODB_CRM_PASSWORD
      - N8N_CRM_USER
      - N8N_CRM_PASSWORD
      - APP_DB
    volumes:
      - db_storage:/var/lib/postgresql/data
      - ./init-data.sh:/docker-entrypoint-initdb.d/init-data.sh
    healthcheck:
      test: ['CMD-SHELL', 'pg_isready -h localhost -U ${POSTGRES_USER} -d ${POSTGRES_DB}']
      interval: 5s
      timeout: 5s
      retries: 10
    deploy:
      resources:
        limits:
          cpus: '1'
          memory: 512M

  n8n:
    image: docker.n8n.io/n8nio/n8n:${N8N_VERSION}
    restart: unless-stopped
    environment:
      - DB_TYPE=postgresdb
      - DB_POSTGRESDB_HOST=postgres
      - DB_POSTGRESDB_PORT=5432
      - DB_POSTGRESDB_DATABASE=${POSTGRES_DB}
      - DB_POSTGRESDB_USER=${POSTGRES_NON_ROOT_USER}
      - DB_POSTGRESDB_PASSWORD=${POSTGRES_NON_ROOT_PASSWORD}
      - N8N_RUNNERS_MODE=external
      - N8N_RUNNERS_AUTH_TOKEN=${RUNNERS_AUTH_TOKEN}
      - N8N_RUNNERS_BROKER_LISTEN_ADDRESS=0.0.0.0
      - N8N_ENCRYPTION_KEY=${N8N_ENCRYPTION_KEY}
      - N8N_HOST=${N8N_HOST}
      - N8N_PROTOCOL=${N8N_PROTOCOL}
      - WEBHOOK_URL=${WEBHOOK_URL}
      - N8N_DIAGNOSTICS_ENABLED=false
    volumes:
      - n8n_storage:/home/node/.n8n
    depends_on:
      postgres:
        condition: service_healthy
    healthcheck:
      test: ['CMD-SHELL', 'wget -qO- http://localhost:5678/healthz || exit 1']
      interval: 10s
      timeout: 5s
      retries: 10
    deploy:
      resources:
        limits:
          cpus: '1'
          memory: 1G

  n8n-runner:
    image: n8nio/runners:${N8N_VERSION}
    restart: unless-stopped
    environment:
      - N8N_RUNNERS_AUTH_TOKEN=${RUNNERS_AUTH_TOKEN}
      - N8N_RUNNERS_TASK_BROKER_URI=http://n8n:5679
    depends_on:
      - n8n
    deploy:
      resources:
        limits:
          cpus: '0.5'
          memory: 256M

  nocodb:
    image: nocodb/nocodb:${NOCODB_VERSION}
    restart: unless-stopped
    environment:
      - NC_DB=pg://postgres:5432?u=${NC_DB_USER}&p=${NC_DB_PASSWORD}&d=${NC_DB}
      - NC_DISABLE_TELE=true
      - NC_ALLOW_LOCAL_EXTERNAL_DBS=${NC_ALLOW_LOCAL_EXTERNAL_DBS}
      - NC_S3_BUCKET_NAME=${MINIO_BUCKET_ATTACHMENTS}
      - NC_S3_REGION=us-east-1
      - NC_S3_ACCESS_KEY=${NOCODB_MINIO_ACCESS_KEY}
      - NC_S3_ACCESS_SECRET=${NOCODB_MINIO_SECRET_KEY}
      - NC_S3_ENDPOINT=${MINIO_ENDPOINT}
      - NC_S3_FORCE_PATH_STYLE=true
    volumes:
      - nocodb_storage:/usr/app/data
    depends_on:
      postgres:
        condition: service_healthy
      minio-init:
        condition: service_completed_successfully
    healthcheck:
      test: ['CMD-SHELL', 'wget -qO- http://localhost:8080/ || exit 1']
      interval: 10s
      timeout: 5s
      retries: 10
    deploy:
      resources:
        limits:
          cpus: '1'
          memory: 1G

  minio:
    image: quay.io/minio/minio:${MINIO_VERSION}
    restart: unless-stopped
    command: server /data --console-address ":9001"
    environment:
      - MINIO_ROOT_USER=${MINIO_ROOT_USER}
      - MINIO_ROOT_PASSWORD=${MINIO_ROOT_PASSWORD}
    volumes:
      - minio_storage:/data
    healthcheck:
      test: ['CMD', 'mc', 'ready', 'local']
      interval: 5s
      timeout: 5s
      retries: 10
    deploy:
      resources:
        limits:
          cpus: '0.5'
          memory: 512M

  # One-shot: creates buckets (PRD §8.5) and a least-privilege NocoDB user, then exits.
  minio-init:
    image: quay.io/minio/mc:latest
    restart: 'no'
    entrypoint: ['/bin/sh', '/minio-init.sh']
    environment:
      - MINIO_ROOT_USER=${MINIO_ROOT_USER}
      - MINIO_ROOT_PASSWORD=${MINIO_ROOT_PASSWORD}
      - MINIO_BUCKET_ATTACHMENTS=${MINIO_BUCKET_ATTACHMENTS}
      - MINIO_BUCKET_OFFERS=${MINIO_BUCKET_OFFERS}
      - MINIO_BUCKET_TEMPLATES=${MINIO_BUCKET_TEMPLATES}
      - MINIO_BUCKET_RECORDINGS=${MINIO_BUCKET_RECORDINGS}
      - MINIO_BUCKET_TRANSCRIPTS=${MINIO_BUCKET_TRANSCRIPTS}
      - MINIO_BUCKET_BACKUPS=${MINIO_BUCKET_BACKUPS}
      - NOCODB_MINIO_ACCESS_KEY=${NOCODB_MINIO_ACCESS_KEY}
      - NOCODB_MINIO_SECRET_KEY=${NOCODB_MINIO_SECRET_KEY}
    volumes:
      - ./minio-init.sh:/minio-init.sh:ro
    depends_on:
      minio:
        condition: service_healthy

  caddy:
    image: caddy:latest
    restart: unless-stopped
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./Caddyfile:/etc/caddy/Caddyfile
      - caddy_data:/data
      - caddy_config:/config
    environment:
      - N8N_HOST=${N8N_HOST}
      - NC_HOST=${NC_HOST}
      - MINIO_HOST=${MINIO_HOST}
    networks:
      default:
        aliases:
          # Lets containers on this network (e.g. nocodb) resolve the same
          # public S3 hostname used in browser-facing presigned URLs, so one
          # NC_S3_ENDPOINT works both internally and externally — traffic is
          # routed through Caddy either way. See docker/README.md.
          - ${MINIO_HOST}
    depends_on:
      - n8n
      - nocodb
      - minio
    deploy:
      resources:
        limits:
          cpus: '0.5'
          memory: 256M
