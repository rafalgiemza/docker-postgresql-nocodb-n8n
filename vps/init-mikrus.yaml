#cloud-config
package_update: true
package_upgrade: true

# 1. SSH hardening
ssh_pwauth: false
disable_root: false

# 2. User & permissions
users:
  - name: deploy
    groups: [sudo, docker]
    shell: /bin/bash
    sudo: ['ALL=(ALL) NOPASSWD:ALL']
    lock_passwd: true
    ssh_authorized_keys:
      - ssh-rsa  rafalgiemza@Rafals-MacBook-Pro.local

# 3. Docker apt repo (codename hardcoded to avoid $RELEASE timing issues)
apt:
  sources:
    docker.list:
      source: "deb [arch=amd64] https://download.docker.com/linux/ubuntu noble stable"
      keyid: 9DC858229FC7DD38854AE2D88D81803C0EBFCD88

# 4. fail2ban for SSH (key-only still gets brute-force noise)
write_files:
  - path: /etc/fail2ban/jail.d/sshd.local
    content: |
      [sshd]
      enabled = true
      mode = aggressive
      maxretry = 3
      bantime = 1h
      findtime = 10m
  - path: /etc/apt/apt.conf.d/20auto-upgrades
    content: |
      APT::Periodic::Update-Package-Lists "1";
      APT::Periodic::Unattended-Upgrade "1";
  # Harden SSH beyond defaults
  - path: /etc/ssh/sshd_config.d/99-hardening.conf
    content: |
      PermitRootLogin no
      PasswordAuthentication no
      KbdInteractiveAuthentication no
      MaxAuthTries 3
      X11Forwarding no

# 5. Packages + service enablement, done explicitly here (instead of the
runcmd:
  - apt-get update
  - DEBIAN_FRONTEND=noninteractive apt-get install -y apt-transport-https ca-certificates curl gnupg git htop fail2ban unattended-upgrades ufw docker-ce docker-ce-cli containerd.io docker-buildx-plugin docker-compose-plugin
  - usermod -aG docker deploy
  - systemctl enable --now docker
  - systemctl enable --now fail2ban
  - systemctl enable --now unattended-upgrades
  - systemctl restart ssh
  # 6. Firewall — allow SSH plus whatever the reverse proxy needs (80/443 for
  # Caddy/Let's Encrypt). Adjust the port rules per project.
  - ufw allow OpenSSH
  - ufw allow 80/tcp
  - ufw allow 443/tcp
  - ufw --force enable